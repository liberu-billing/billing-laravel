apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: liberu-billing-ingress
  namespace: liberu-billing
  labels:
    app.kubernetes.io/name: liberu-billing
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - billing.liberu.co.uk
      secretName: liberu-billing-tls
  rules:
    - host: billing.liberu.co.uk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: liberu-billing-app
                port:
                  number: 80
