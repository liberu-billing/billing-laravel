apiVersion: apps/v1
kind: Deployment
metadata:
  name: liberu-billing-app
  namespace: liberu-billing
  labels:
    app.kubernetes.io/name: liberu-billing
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: liberu-billing-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: liberu-billing-app
        app.kubernetes.io/name: liberu-billing
        app.kubernetes.io/component: app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z liberu-billing-mysql 3306; do
                echo "Waiting for MySQL…"
                sleep 3
              done
              echo "MySQL is ready."
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
        - name: migrations
          image: liberu/billing:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              php artisan migrate --force --no-interaction
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
          envFrom:
            - configMapRef:
                name: liberu-billing-config
            - secretRef:
                name: liberu-billing-secrets
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app
      containers:
        - name: app
          image: liberu/billing:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9000
              name: php-fpm
              protocol: TCP
          envFrom:
            - configMapRef:
                name: liberu-billing-config
            - secretRef:
                name: liberu-billing-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app
            - name: logs
              mountPath: /var/www/html/storage/logs

        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: false
            runAsUser: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
          readinessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: storage
              mountPath: /var/www/html/storage/app
              readOnly: true

      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: liberu-billing-storage
        - name: logs
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: liberu-billing-nginx-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liberu-billing-horizon
  namespace: liberu-billing
  labels:
    app.kubernetes.io/name: liberu-billing
    app.kubernetes.io/component: horizon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liberu-billing-horizon
  template:
    metadata:
      labels:
        app: liberu-billing-horizon
        app.kubernetes.io/name: liberu-billing
        app.kubernetes.io/component: horizon
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z liberu-billing-mysql 3306; do
                echo "Waiting for MySQL…"
                sleep 3
              done
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      containers:
        - name: horizon
          image: liberu/billing:latest
          imagePullPolicy: Always
          env:
            - name: CONTAINER_MODE
              value: "horizon"
          envFrom:
            - configMapRef:
                name: liberu-billing-config
            - secretRef:
                name: liberu-billing-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: liberu-billing-storage
