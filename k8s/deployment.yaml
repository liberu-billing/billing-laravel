apiVersion: apps/v1
kind: Deployment
metadata:
  name: liberu-billing-app
  namespace: liberu-billing
  labels:
    app.kubernetes.io/name: liberu-billing
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: liberu-billing-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: liberu-billing-app
        app.kubernetes.io/name: liberu-billing
        app.kubernetes.io/component: app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: liberu/billing:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: liberu-billing-config
            - secretRef:
                name: liberu-billing-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /up
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /up
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app
            - name: logs
              mountPath: /var/www/html/storage/logs
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: liberu-billing-storage
        - name: logs
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liberu-billing-horizon
  namespace: liberu-billing
  labels:
    app.kubernetes.io/name: liberu-billing
    app.kubernetes.io/component: horizon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liberu-billing-horizon
  template:
    metadata:
      labels:
        app: liberu-billing-horizon
        app.kubernetes.io/name: liberu-billing
        app.kubernetes.io/component: horizon
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: horizon
          image: liberu/billing:latest
          imagePullPolicy: Always
          env:
            - name: CONTAINER_MODE
              value: "horizon"
          envFrom:
            - configMapRef:
                name: liberu-billing-config
            - secretRef:
                name: liberu-billing-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: liberu-billing-storage
