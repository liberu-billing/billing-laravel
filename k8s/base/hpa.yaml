apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: liberu-billing-app-hpa
  namespace: liberu-billing
  labels:
    app.kubernetes.io/name: liberu-billing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: liberu-billing-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
