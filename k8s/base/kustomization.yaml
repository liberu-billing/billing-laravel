apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: liberu-billing

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: liberu

resources:
  - namespace.yaml
  - configmap.yaml
  - nginx-configmap.yaml
  - secret.yaml
  - pvc.yaml
  - mysql.yaml
  - redis.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - pdb.yaml
  - network-policy.yaml
  - resource-quota.yaml
