apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: liberu-billing-mysql
  namespace: liberu-billing
  labels:
    app.kubernetes.io/name: liberu-billing
    app.kubernetes.io/component: mysql
spec:
  serviceName: liberu-billing-mysql
  replicas: 1
  selector:
    matchLabels:
      app: liberu-billing-mysql
  template:
    metadata:
      labels:
        app: liberu-billing-mysql
        app.kubernetes.io/name: liberu-billing
        app.kubernetes.io/component: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: liberu-billing-secrets
                  key: DB_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: liberu-billing-config
                  key: DB_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: liberu-billing-secrets
                  key: DB_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: liberu-billing-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: liberu-billing-mysql-data
