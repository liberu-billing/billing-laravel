apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: liberu-billing

resources:
  - ../../
  - hpa.yaml

configMapGenerator:
  - name: liberu-billing-config
    behavior: merge
    literals:
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_LEVEL=error

images:
  - name: liberu/billing
    newTag: latest
